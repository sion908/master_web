{%- extends "page.html" -%}

{% block content %}
<div class="main-wrapper">
    <div class="container content-container no-sidebar">
        <article class="main-content premium-card">
            <h1>タグクラウド</h1>
            <p>興味のあるトピックから記事を探す</p>
            
            <div class="tag-cloud-wrapper">
                <ul class="ablog-cloud">
                    {%- for tag in ablog_section -%}
                    <li><a href="{{ pathto(tag.docname) }}">{{ tag }}</a></li>
                    {%- endfor -%}
                </ul>
            </div>
        </article>
    </div>
</div>
{% endblock %}
